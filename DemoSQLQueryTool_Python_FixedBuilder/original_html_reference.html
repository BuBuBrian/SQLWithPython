<!DOCTYPE html>
<!--
  宣告這是一份 HTML5 文件。
  瀏覽器會使用現代 HTML 標準解析此檔案。
-->
<html lang="zh-Hant">
<!--
  lang="zh-Hant" 表示頁面主要語言是繁體中文。
-->

<head>
  <!-- 指定網頁使用 UTF-8 編碼，才能正常顯示中文。 -->
  <meta charset="UTF-8">

  <!--
    讓網頁在手機、平板上依照裝置寬度顯示，
    避免頁面被縮得很小。
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 瀏覽器分頁上顯示的標題。 -->
  <title>demo.sql SQL 查詢介面－中文註解版</title>

  <style>
    /*
      ==============================
      1. 全域樣式與基本設定
      ==============================
    */

    :root {
      /*
        設定整個網頁預設使用的字型。
        system-ui 會優先使用作業系統內建字型。
      */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Microsoft JhengHei", sans-serif;

      /* 預設文字顏色。 */
      color: #1f2937;

      /* 整個頁面的背景顏色。 */
      background: #f4f6f8;
    }

    /*
      讓所有元素的 width 和 height 都包含 padding 與 border，
      比較容易計算版面尺寸。
    */
    * {
      box-sizing: border-box;
    }

    body {
      /* 移除瀏覽器預設的外距。 */
      margin: 0;

      /* 頁面上下 28px、左右 16px 的內距。 */
      padding: 28px 16px;
    }

    /*
      ==============================
      2. 主要版面容器
      ==============================
    */

    .app {
      /* 限制內容最大寬度，避免螢幕太寬時內容被拉得太散。 */
      max-width: 1250px;

      /* 左右 auto 會讓整個區塊水平置中。 */
      margin: 0 auto;
    }

    .card {
      /* 卡片背景設為白色。 */
      background: #fff;

      /* 卡片外框。 */
      border: 1px solid #dfe3e8;

      /* 圓角。 */
      border-radius: 14px;

      /* 陰影效果。 */
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);

      /*
        超出卡片圓角範圍的內容隱藏，
        避免內部背景蓋住圓角。
      */
      overflow: hidden;
    }

    /*
      ==============================
      3. 頁面標題區
      ==============================
    */

    header {
      /* 標題區內距。 */
      padding: 22px 24px;

      /* 標題區底部分隔線。 */
      border-bottom: 1px solid #e5e7eb;
    }

    h1 {
      /*
        上、左、右外距為 0，
        下方保留 8px。
      */
      margin: 0 0 8px;

      /* 標題字體大小。 */
      font-size: 24px;
    }

    .description {
      /* 移除段落預設外距。 */
      margin: 0;

      /* 說明文字使用較淡的顏色。 */
      color: #64748b;

      /* 增加行高，提升閱讀性。 */
      line-height: 1.6;
    }

    /*
      ==============================
      4. SQL 查詢控制區
      ==============================
    */

    .query-panel {
      /* 使用 CSS Grid 排版。 */
      display: grid;

      /*
        一列最多放 6 欄。
        每欄至少 140px，空間足夠時平均分配。
      */
      grid-template-columns: repeat(6, minmax(140px, 1fr));

      /* 每個控制元件之間的距離。 */
      gap: 12px;

      /* 控制區內距。 */
      padding: 18px 24px;

      /* 控制區淺灰色背景。 */
      background: #fafafa;

      /* 控制區底部分隔線。 */
      border-bottom: 1px solid #e5e7eb;
    }

    .field {
      /*
        每個欄位內也使用 Grid，
        讓 label 與輸入元件上下排列。
      */
      display: grid;

      /* label 與輸入元件間距。 */
      gap: 6px;

      /*
        允許欄位縮小，
        避免內容撐破 Grid。
      */
      min-width: 0;
    }

    .field.wide {
      /* 具有 wide 類別的欄位占用兩欄寬度。 */
      grid-column: span 2;
    }

    label {
      /* 標籤字體大小。 */
      font-size: 13px;

      /* 標籤粗體。 */
      font-weight: 700;

      /* 標籤文字顏色。 */
      color: #334155;
    }

    /*
      select、input、button 共用的外觀設定。
    */
    select,
    input,
    button {
      /* 元件占滿父容器寬度。 */
      width: 100%;

      /* 設定最小高度。 */
      min-height: 40px;

      /* 元件內距。 */
      padding: 8px 10px;

      /* 元件邊框。 */
      border: 1px solid #cbd5e1;

      /* 元件圓角。 */
      border-radius: 8px;

      /* 繼承頁面字型。 */
      font: inherit;

      /* 元件背景。 */
      background: #fff;
    }

    button {
      /* 滑鼠移到按鈕時顯示手指游標。 */
      cursor: pointer;

      /* 按鈕文字粗體。 */
      font-weight: 700;
    }

    button:hover {
      /* 滑鼠移到一般按鈕上的背景顏色。 */
      background: #f1f5f9;
    }

    .primary {
      /* 主要按鈕深色背景。 */
      background: #1f2937;

      /* 主要按鈕白色文字。 */
      color: #fff;

      /* 邊框顏色與背景一致。 */
      border-color: #1f2937;
    }

    .primary:hover {
      /* 主要按鈕 hover 時稍微變亮。 */
      background: #374151;
    }

    .button-row {
      /* 讓三個按鈕水平排列。 */
      display: flex;

      /* 按鈕之間保留 8px。 */
      gap: 8px;

      /* 對齊底部。 */
      align-items: end;
    }

    /*
      ==============================
      5. SQL 預覽區
      ==============================
    */

    .sql-box {
      /* SQL 預覽區內距。 */
      padding: 16px 24px;

      /* 底部分隔線。 */
      border-bottom: 1px solid #e5e7eb;

      /* 深色背景，模擬程式碼編輯器。 */
      background: #111827;

      /* SQL 文字顏色。 */
      color: #e5e7eb;
    }

    .sql-title {
      /* 標題與 SQL 之間的距離。 */
      margin-bottom: 8px;

      /* 淺藍色標題。 */
      color: #93c5fd;

      /* 粗體。 */
      font-weight: 700;

      /* 字體大小。 */
      font-size: 13px;
    }

    pre {
      /* 移除 pre 預設外距。 */
      margin: 0;

      /* 保留換行，但允許過長內容換行。 */
      white-space: pre-wrap;

      /* 很長的內容也可以斷行。 */
      overflow-wrap: anywhere;

      /* 增加行高。 */
      line-height: 1.55;
    }

    /*
      ==============================
      6. demo.sql 手動選檔備用區
      ==============================
    */

    .file-fallback {
      /*
        預設隱藏。
        只有自動讀取 demo.sql 失敗時才會用 JavaScript 顯示。
      */
      display: none;

      /* 子元素之間距離。 */
      gap: 10px;

      /* 垂直置中。 */
      align-items: center;

      /* 空間不足時允許換行。 */
      flex-wrap: wrap;

      /* 區塊內距。 */
      padding: 14px 24px;

      /* 淺橘色警示背景。 */
      background: #fff7ed;

      /* 底部分隔線。 */
      border-bottom: 1px solid #fed7aa;
    }

    /*
      ==============================
      7. 狀態列
      ==============================
    */

    .status {
      /* 左右兩個狀態文字使用 Flex 排列。 */
      display: flex;

      /* 一個靠左、一個靠右。 */
      justify-content: space-between;

      /* 空間不足時可換行。 */
      flex-wrap: wrap;

      /* 換行或元素間距。 */
      gap: 8px;

      /* 內距。 */
      padding: 13px 24px;

      /* 文字顏色。 */
      color: #475569;

      /* 底部分隔線。 */
      border-bottom: 1px solid #e5e7eb;
    }

    .status strong {
      /* 狀態列中的重點數字使用深色。 */
      color: #111827;
    }

    /*
      ==============================
      8. 結果資料表
      ==============================
    */

    .table-wrap {
      /*
        如果資料表太高，限制最大高度為畫面高度的 62%。
      */
      max-height: 62vh;

      /* 超出時顯示捲軸。 */
      overflow: auto;
    }

    table {
      /* 資料表占滿容器寬度。 */
      width: 100%;

      /* 合併相鄰儲存格邊框。 */
      border-collapse: collapse;

      /* 預設不讓儲存格文字自動換行。 */
      white-space: nowrap;
    }

    th,
    td {
      /* 儲存格內距。 */
      padding: 9px 11px;

      /* 右邊框。 */
      border-right: 1px solid #e5e7eb;

      /* 下邊框。 */
      border-bottom: 1px solid #e5e7eb;

      /* 文字靠左。 */
      text-align: left;

      /* 內容靠上。 */
      vertical-align: top;
    }

    th {
      /*
        表頭固定在捲動區最上方。
      */
      position: sticky;
      top: 0;

      /* 確保表頭蓋在內容上。 */
      z-index: 2;

      /* 表頭背景。 */
      background: #eef2f7;

      /* 表頭字體大小。 */
      font-size: 13px;
    }

    tbody tr:nth-child(even) {
      /* 偶數資料列使用淺灰背景。 */
      background: #fafafa;
    }

    tbody tr:hover {
      /* 滑鼠移到資料列時改成淺藍色。 */
      background: #eff6ff;
    }

    .null {
      /* NULL 使用灰色。 */
      color: #9ca3af;

      /* NULL 使用斜體。 */
      font-style: italic;
    }

    .message {
      /* 無資料或載入訊息的內距。 */
      padding: 34px 24px;

      /* 文字置中。 */
      text-align: center;

      /* 訊息文字顏色。 */
      color: #64748b;
    }

    .error {
      /* 錯誤訊息使用紅色。 */
      color: #b91c1c;
    }

    code {
      /* 行內程式碼內距。 */
      padding: 2px 5px;

      /* 行內程式碼圓角。 */
      border-radius: 4px;

      /* 行內程式碼背景。 */
      background: #e8edf3;
    }

    /*
      ==============================
      9. 響應式設計
      ==============================
    */

    @media (max-width: 950px) {
      /*
        當畫面寬度小於等於 950px，
        查詢控制區改成兩欄。
      */
      .query-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      /* wide 欄位仍占兩欄。 */
      .field.wide {
        grid-column: span 2;
      }
    }

    @media (max-width: 560px) {
      /*
        當畫面寬度小於等於 560px，
        查詢控制區改成單欄。
      */
      .query-panel {
        grid-template-columns: 1fr;
      }

      /* 單欄模式中 wide 只占一欄。 */
      .field.wide {
        grid-column: span 1;
      }

      /* 按鈕改成垂直排列。 */
      .button-row {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!--
    main 是頁面的主要內容區。
    class="app" 用來限制最大寬度並置中。
  -->
  <main class="app">

    <!-- 整個查詢介面的白色卡片。 -->
    <section class="card">

      <!-- 頁面標題與功能說明。 -->
      <header>
        <h1>demo.sql SQL 查詢介面</h1>

        <p class="description">
          先選資料表，再設定第一個 WHERE 條件。
          每個條件都可選擇 <code>NOT</code> 反轉結果。
          若需要兩個條件，可再選擇第二個欄位，並使用
          <code>AND</code> 或 <code>OR</code> 連接。
          介面會產生對應的
          <code>SELECT / FROM / WHERE / ORDER BY</code>
          SQL。使用 LIKE 時，請自行輸入
          <code>%an%</code>、<code>an%</code>
          或 <code>%an</code>。
        </p>
      </header>

      <!--
        查詢條件控制區。
        使用者可在此選擇資料表、欄位、比較條件與排序方式。
      -->
      <section class="query-panel">

        <!-- FROM：選擇資料表。 -->
        <div class="field">
          <label for="tableSelect">FROM：資料表</label>

          <!--
            disabled 表示資料載入完成前不可操作。
            JavaScript 讀取 demo.sql 後會加入資料表選項並解除 disabled。
          -->
          <select id="tableSelect" disabled>
            <option value="">讀取中……</option>
          </select>
        </div>

        <!-- WHERE：選擇要檢查的欄位。 -->
        <div class="field">
          <label for="columnSelect">WHERE 條件 1：搜尋欄位</label>

          <!--
            當使用者選擇資料表後，
            JavaScript 會把該表的所有 Column 加入這個下拉選單。
          -->
          <select id="columnSelect" disabled>
            <option value="">請先選資料表</option>
          </select>
        </div>

        <!--
          條件 1 的 NOT 功能。

          一般條件：
          Country = 'Germany'

          選擇 NOT 後：
          NOT (Country = 'Germany')

          NOT 會反轉整個條件的結果。
        -->
        <div class="field">
          <label for="notSelect1">條件 1：NOT</label>

          <select id="notSelect1" disabled>
            <option value="">一般條件</option>
            <option value="NOT">NOT（反轉條件）</option>
          </select>
        </div>

        <!-- 選擇 SQL 比較運算子。 -->
        <div class="field">
          <label for="operatorSelect">條件 1：比較方式</label>

          <select id="operatorSelect" disabled>
            <!-- value 是 JavaScript 內部使用的代號，不是 SQL。 -->
            <option value="like">LIKE（自行輸入 % 或 _）</option>
            <option value="eq">等於（=）</option>
            <option value="neq">不等於（&lt;&gt;）</option>
            <option value="gt">大於（&gt;）</option>
            <option value="gte">大於等於（&gt;=）</option>
            <option value="lt">小於（&lt;）</option>
            <option value="lte">小於等於（&lt;=）</option>
            <option value="between">介於（BETWEEN）</option>
            <option value="isnull">是 NULL</option>
            <option value="notnull">不是 NULL</option>
          </select>
        </div>

        <!-- 輸入 WHERE 比較使用的第一個值。 -->
        <div class="field">
          <label for="valueInput">條件 1：搜尋值</label>

          <input
            id="valueInput"
            type="text"
            placeholder="例如 %an%、an%、%an 或 Germany"
            disabled
          >
        </div>

        <!--
          BETWEEN 需要兩個值。
          hidden 代表預設隱藏，只有選到 BETWEEN 時才顯示。
        -->
        <div class="field" id="value2Field" hidden>
          <label for="valueInput2">條件 1：BETWEEN 第二值</label>

          <input
            id="valueInput2"
            type="text"
            placeholder="例如 50"
            disabled
          >
        </div>

        <!--
          第二個 WHERE 條件為選用功能。

          columnSelect2 的第一個選項是「不使用第二條件」。
          只有選擇實際欄位後，AND / OR、比較方式及搜尋值才會啟用。
        -->
        <div class="field">
          <label for="logicalOperatorSelect">條件連接方式</label>

          <select id="logicalOperatorSelect" disabled>
            <!--
              AND：兩個條件都必須成立。
              OR：兩個條件只要任一成立。
            -->
            <option value="AND">AND（兩個都要符合）</option>
            <option value="OR">OR（任一符合即可）</option>
          </select>
        </div>

        <!-- 第二個 WHERE 欄位。 -->
        <div class="field">
          <label for="columnSelect2">WHERE 條件 2：搜尋欄位</label>

          <select id="columnSelect2" disabled>
            <option value="">不使用第二條件</option>
          </select>
        </div>

        <!--
          條件 2 的 NOT 功能。

          條件 1 與條件 2 各自有獨立的 NOT，
          因此可以只反轉其中一個條件。

          例如：
          WHERE NOT (Country = 'Germany')
            OR (Country = 'France')
        -->
        <div class="field">
          <label for="notSelect2">條件 2：NOT</label>

          <select id="notSelect2" disabled>
            <option value="">一般條件</option>
            <option value="NOT">NOT（反轉條件）</option>
          </select>
        </div>

        <!-- 第二個 WHERE 條件的比較方式。 -->
        <div class="field">
          <label for="operatorSelect2">條件 2：比較方式</label>

          <select id="operatorSelect2" disabled>
            <!-- value 是 JavaScript 內部代號，不是 SQL 關鍵字。 -->
            <option value="like">LIKE（自行輸入 % 或 _）</option>
            <option value="eq">等於（=）</option>
            <option value="neq">不等於（&lt;&gt;）</option>
            <option value="gt">大於（&gt;）</option>
            <option value="gte">大於等於（&gt;=）</option>
            <option value="lt">小於（&lt;）</option>
            <option value="lte">小於等於（&lt;=）</option>
            <option value="between">介於（BETWEEN）</option>
            <option value="isnull">是 NULL</option>
            <option value="notnull">不是 NULL</option>
          </select>
        </div>

        <!-- 第二個 WHERE 條件的第一個搜尋值。 -->
        <div class="field">
          <label for="valueInput3">條件 2：搜尋值</label>

          <input
            id="valueInput3"
            type="text"
            placeholder="例如 France、%an% 或 50"
            disabled
          >
        </div>

        <!--
          第二個條件若選 BETWEEN，才會顯示此輸入框。
        -->
        <div class="field" id="value4Field" hidden>
          <label for="valueInput4">條件 2：BETWEEN 第二值</label>

          <input
            id="valueInput4"
            type="text"
            placeholder="例如 100"
            disabled
          >
        </div>

        <!-- 選擇 ORDER BY 欄位。 -->
        <div class="field">
          <label for="orderColumnSelect">ORDER BY：排序欄位</label>

          <select id="orderColumnSelect" disabled>
            <option value="">不排序</option>
          </select>
        </div>

        <!-- 選擇升冪或降冪。 -->
        <div class="field">
          <label for="orderDirectionSelect">排序方向</label>

          <select id="orderDirectionSelect" disabled>
            <option value="ASC">ASC（正序）</option>
            <option value="DESC">DESC（反序）</option>
          </select>
        </div>

        <!--
          決定排序時是否先把文字轉成數字。
          適合 CustomerID 這種 VARCHAR 內放數字的欄位。
        -->
        <div class="field">
          <label for="numericSort">排序方式</label>

          <select id="numericSort" disabled>
            <option value="normal">依原欄位型態</option>
            <option value="number">轉成數字排序</option>
          </select>
        </div>

        <!-- 執行相關按鈕。 -->
        <div class="field wide">
          <label>執行</label>

          <div class="button-row">
            <!-- 執行目前設定的篩選與排序。 -->
            <button
              id="runButton"
              class="primary"
              type="button"
              disabled
            >
              執行查詢
            </button>

            <!-- 清除查詢條件並顯示該表全部資料。 -->
            <button
              id="showAllButton"
              type="button"
              disabled
            >
              顯示全部
            </button>

            <!--
              將目前畫面中已執行完成的查詢結果匯出成 Excel。

              Excel 最上方會先放：
              SELECT
              FROM
              WHERE
              ORDER BY

              接著空一列，再放欄位名稱與目前結果。
            -->
            <button
              id="exportButton"
              type="button"
              disabled
            >
              匯出目前結果 Excel
            </button>

            <!-- 重新從 ./demo.sql 載入資料。 -->
            <button id="reloadButton" type="button">
              重新讀取
            </button>
          </div>
        </div>
      </section>

      <!-- 顯示介面產生的 SQL 文字。 -->
      <section class="sql-box">
        <div class="sql-title">目前產生的 SQL</div>

        <!--
          pre 會保留換行與空白。
          JavaScript 會更新這裡的 textContent。
        -->
        <pre id="sqlPreview">SELECT *
FROM demo.資料表;</pre>
      </section>

      <!--
        若 fetch("./demo.sql") 失敗，
        JavaScript 會顯示此手動選檔區。
      -->
      <div id="fileFallback" class="file-fallback">
        <span>
          無法自動讀取相對路徑時，請手動選擇 demo.sql：
        </span>

        <input
          id="fileInput"
          type="file"
          accept=".sql,text/plain"
        >
      </div>

      <!-- 顯示讀檔結果及查詢筆數。 -->
      <div class="status">
        <span id="loadStatus">準備讀取資料……</span>
        <span id="rowStatus"></span>
      </div>

      <!-- 查詢結果會放在這個容器中。 -->
      <div id="tableContainer">
        <div class="message">正在載入……</div>
      </div>
    </section>
  </main>

  <!--
    載入 SheetJS 的瀏覽器版本。

    SheetJS 會把 JavaScript 二維陣列轉換成真正的 .xlsx 活頁簿，
    並讓瀏覽器下載 Excel 檔案。

    這裡使用網路 CDN，因此匯出 Excel 時需要能連上網路。
    demo.sql 的讀取與查詢功能本身不依賴此套件。
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    /*
      啟用 JavaScript 嚴格模式。
      可避免部分容易出錯的寫法。
    */
    "use strict";

    /*
      ==============================
      1. 資料表的顯示順序
      ==============================
    */

    /*
      指定下拉選單中資料表的優先順序。
      若 demo.sql 還有其他表，其他表會排在後面。
    */
    const preferredTableOrder = [
      "categories",
      "customers",
      "employees",
      "orderdetails",
      "orders",
      "products",
      "shippers",
      "suppliers"
    ];

    /*
      ==============================
      2. 取得 HTML 元件
      ==============================
    */

    /*
      document.getElementById() 會取得 HTML 中具有相同 id 的元素。
      取得後就能在 JavaScript 中讀取或修改它。
    */

    // FROM 資料表下拉選單。
    const tableSelect =
      document.getElementById("tableSelect");

    // WHERE 欄位下拉選單。
    const columnSelect =
      document.getElementById("columnSelect");

    /*
      第一個 WHERE 條件的 NOT 下拉選單。

      value 為空字串：
      不反轉條件。

      value 為 "NOT"：
      反轉整個條件。
    */
    const notSelect1 =
      document.getElementById("notSelect1");

    // 比較條件下拉選單。
    const operatorSelect =
      document.getElementById("operatorSelect");

    // 第一個搜尋值輸入框。
    const valueInput =
      document.getElementById("valueInput");

    // BETWEEN 的第二個搜尋值輸入框。
    const valueInput2 =
      document.getElementById("valueInput2");

    // 包住第二個值輸入框的區塊。
    const value2Field =
      document.getElementById("value2Field");

    /*
      AND / OR 連接方式下拉選單。
    */
    const logicalOperatorSelect =
      document.getElementById("logicalOperatorSelect");

    /*
      第二個 WHERE 欄位下拉選單。
    */
    const columnSelect2 =
      document.getElementById("columnSelect2");

    /*
      第二個 WHERE 條件的 NOT 下拉選單。
    */
    const notSelect2 =
      document.getElementById("notSelect2");

    /*
      第二個 WHERE 條件的比較方式。
    */
    const operatorSelect2 =
      document.getElementById("operatorSelect2");

    /*
      第二個 WHERE 條件的第一個搜尋值。
    */
    const valueInput3 =
      document.getElementById("valueInput3");

    /*
      第二個 WHERE 條件在 BETWEEN 時使用的第二個值。
    */
    const valueInput4 =
      document.getElementById("valueInput4");

    /*
      包住條件 2 BETWEEN 第二值的區塊。
    */
    const value4Field =
      document.getElementById("value4Field");

    // ORDER BY 欄位下拉選單。
    const orderColumnSelect =
      document.getElementById("orderColumnSelect");

    // ASC / DESC 下拉選單。
    const orderDirectionSelect =
      document.getElementById("orderDirectionSelect");

    // 是否轉成數字排序。
    const numericSort =
      document.getElementById("numericSort");

    // 執行查詢按鈕。
    const runButton =
      document.getElementById("runButton");

    // 顯示全部按鈕。
    const showAllButton =
      document.getElementById("showAllButton");

    /*
      匯出目前查詢結果為 Excel 的按鈕。
    */
    const exportButton =
      document.getElementById("exportButton");

    // 重新讀取 demo.sql 按鈕。
    const reloadButton =
      document.getElementById("reloadButton");

    // 顯示產生 SQL 的區域。
    const sqlPreview =
      document.getElementById("sqlPreview");

    // 自動讀檔失敗時的備用選檔區。
    const fileFallback =
      document.getElementById("fileFallback");

    // 手動選擇 demo.sql 的 input。
    const fileInput =
      document.getElementById("fileInput");

    // 顯示 demo.sql 載入狀態。
    const loadStatus =
      document.getElementById("loadStatus");

    // 顯示目前查詢結果筆數。
    const rowStatus =
      document.getElementById("rowStatus");

    // 放置查詢結果資料表。
    const tableContainer =
      document.getElementById("tableContainer");

    /*
      ==============================
      3. 程式執行期間使用的資料
      ==============================
    */

    /*
      database 用來保存從 demo.sql 解析出的資料。

      結構大致如下：
      {
        customers: {
          columns: ["CustomerID", "CustomerName", ...],
          types: {
            CustomerID: "varchar(10)",
            CustomerName: "varchar(255)"
          },
          rows: [
            ["1", "Alfreds...", ...],
            ["2", "Ana...", ...]
          ]
        }
      }
    */
    let database = {};

    /*
      保存最近一次查詢的結果。
      目前主要用於保留狀態，之後也可拿來匯出。
    */
    let currentResult = [];

    /*
      保存「最後一次真正執行並顯示結果」所使用的 SQL。

      sqlPreview 會隨著使用者輸入即時改變，
      但使用者可能尚未按下「執行查詢」。

      匯出 Excel 時使用 lastExecutedSql，
      才能確保 Excel 上方的 SQL 與下方資料完全一致。
    */
    let lastExecutedSql = "";

    /*
      ==============================
      4. MySQL 字串跳脫轉換
      ==============================
    */

    /*
      demo.sql 的字串中可能包含：
      \n、\t、\\、\' 等 MySQL 跳脫字元。

      此函式把跳脫代號轉回真正字元。
    */
    function decodeMysqlEscape(character) {
      /*
        escapes 是「跳脫代號 → 真正字元」的對照表。
      */
      const escapes = {
        "0": "\0",   // 空字元
        "b": "\b",   // 退格
        "n": "\n",   // 換行
        "r": "\r",   // 歸位
        "t": "\t",   // Tab
        "Z": "\x1a", // Ctrl+Z
        "\\": "\\",  // 反斜線
        "'": "'",    // 單引號
        '"': '"'     // 雙引號
      };

      /*
        若對照表中存在該字元，就回傳轉換結果；
        否則直接回傳原字元。
      */
      return Object.prototype.hasOwnProperty.call(
        escapes,
        character
      )
        ? escapes[character]
        : character;
    }

    /*
      ==============================
      5. 解析 INSERT INTO 的 VALUES
      ==============================
    */

    /*
      valuesText 可能長這樣：

      (1,'Chais',1,1,'10 boxes',18.00),
      (2,'Chang',1,1,'24 bottles',19.00)

      此函式把它轉成 JavaScript 二維陣列。
    */
    function parseValueTuples(valuesText) {
      // 保存所有解析完成的資料列。
      const rows = [];

      // index 表示目前解析到字串的哪一個位置。
      let index = 0;

      /*
        內部工具函式：
        略過空格、換行、Tab 等空白字元。
      */
      function skipWhitespace() {
        while (
          index < valuesText.length &&
          /\s/.test(valuesText[index])
        ) {
          index += 1;
        }
      }

      /*
        只要還沒讀完整段 VALUES，
        就繼續尋找下一個 (...)。
      */
      while (index < valuesText.length) {
        // 先略過空白。
        skipWhitespace();

        /*
          不同 Row 之間通常用逗號分隔。
          遇到逗號就跳到下一個字元。
        */
        if (valuesText[index] === ",") {
          index += 1;
          continue;
        }

        /*
          如果目前不是左括號，
          表示尚未到一筆 Row 的開始，繼續往後找。
        */
        if (valuesText[index] !== "(") {
          index += 1;
          continue;
        }

        // 略過左括號 "("。
        index += 1;

        // 建立目前這一筆 Row。
        const row = [];

        /*
          開始讀取 Row 裡的每一個欄位值。
        */
        while (index < valuesText.length) {
          // 略過欄位值前面的空白。
          skipWhitespace();

          // 暫存目前讀到的欄位值。
          let value;

          /*
            如果值以單引號開始，
            代表這是一個 SQL 文字值。
          */
          if (valuesText[index] === "'") {
            // 略過開頭單引號。
            index += 1;

            // 保存文字內容。
            let text = "";

            /*
              持續讀到文字結尾的單引號。
            */
            while (index < valuesText.length) {
              // 目前字元。
              const current = valuesText[index];

              /*
                遇到反斜線表示下一個字元是 MySQL 跳脫字元。
              */
              if (current === "\\") {
                // 移到被跳脫的字元。
                index += 1;

                // 確認沒有超出字串範圍。
                if (index < valuesText.length) {
                  /*
                    把跳脫字元轉回真正內容，
                    再加進 text。
                  */
                  text += decodeMysqlEscape(
                    valuesText[index]
                  );

                  // 移到下一個字元。
                  index += 1;
                }

                // 本次迴圈處理完畢。
                continue;
              }

              /*
                遇到單引號時，
                可能是文字結尾，也可能是 SQL 的兩個單引號跳脫。
              */
              if (current === "'") {
                /*
                  SQL 中兩個連續單引號 '' 代表文字中的一個單引號。
                */
                if (valuesText[index + 1] === "'") {
                  text += "'";
                  index += 2;
                  continue;
                }

                /*
                  不是兩個連續單引號，
                  表示文字值已結束。
                */
                index += 1;
                break;
              }

              // 一般字元直接加入文字。
              text += current;

              // 移到下一個字元。
              index += 1;
            }

            // 把解析完成的字串指定給 value。
            value = text;
          } else {
            /*
              不是單引號開頭，
              可能是數字、NULL 或其他未加引號內容。
            */

            // 記錄值開始位置。
            const start = index;

            /*
              持續讀到逗號或右括號。
            */
            while (
              index < valuesText.length &&
              valuesText[index] !== "," &&
              valuesText[index] !== ")"
            ) {
              index += 1;
            }

            /*
              取出該段文字並移除前後空白。
            */
            const token = valuesText
              .slice(start, index)
              .trim();

            /*
              /^NULL$/i：
              i 表示不分大小寫，
              所以 NULL、null、Null 都會符合。
            */
            if (/^NULL$/i.test(token)) {
              // SQL NULL 轉成 JavaScript null。
              value = null;
            } else if (
              /*
                判斷 token 是否為整數、小數或科學記號數字。
              */
              /^-?(?:\d+\.?\d*|\.\d+)(?:e[+-]?\d+)?$/i
                .test(token)
            ) {
              // 將數字文字轉成真正的 Number。
              value = Number(token);
            } else {
              /*
                既不是 NULL 也不是數字，
                就先保留原始文字。
              */
              value = token;
            }
          }

          // 把目前欄位值加入這筆 Row。
          row.push(value);

          // 略過欄位值後方空白。
          skipWhitespace();

          /*
            遇到逗號表示後面還有下一個欄位。
          */
          if (valuesText[index] === ",") {
            index += 1;
            continue;
          }

          /*
            遇到右括號表示這一筆 Row 結束。
          */
          if (valuesText[index] === ")") {
            // 略過右括號。
            index += 1;

            // 把完整 Row 加入 rows。
            rows.push(row);

            // 離開目前 Row 的解析迴圈。
            break;
          }
        }
      }

      // 回傳所有解析完成的資料列。
      return rows;
    }

    /*
      ==============================
      6. 解析整份 demo.sql
      ==============================
    */

    /*
      此函式會解析兩類 SQL：

      1. CREATE TABLE
         取得資料表名稱、欄位名稱、資料型態。

      2. INSERT INTO ... VALUES
         取得資料表內的資料列。
    */
    function parseSqlDump(sqlText) {
      // 保存解析後的所有資料表。
      const parsed = {};

      /*
        尋找 CREATE TABLE `表名` (...) ENGINE=...

        ([^`]+)
        → 取得反引號中的表名。

        ([\s\S]*?)
        → 取得括號中的欄位定義。
      */
      const createRegex =
        /CREATE TABLE\s+`([^`]+)`\s*\(([\s\S]*?)\)\s*ENGINE=/gi;

      // match 保存每次正規表示式找到的結果。
      let match;

      /*
        exec() 每次會找到下一個 CREATE TABLE，
        找不到時回傳 null。
      */
      while ((match = createRegex.exec(sqlText)) !== null) {
        // match[1] 是資料表名稱。
        const tableName = match[1];

        // match[2] 是 CREATE TABLE 括號內的定義。
        const definition = match[2];

        // 保存此表的欄位順序。
        const columns = [];

        // 保存「欄位名稱 → 資料型態」。
        const types = {};

        // 把 CREATE TABLE 定義依換行拆開。
        const lines = definition.split(/\r?\n/);

        /*
          逐行尋找欄位定義。
        */
        for (const line of lines) {
          /*
            欄位通常長這樣：
            `CustomerID` varchar(10) NOT NULL

            columnMatch[1] = CustomerID
            columnMatch[2] = varchar(10)
          */
          const columnMatch = line.match(
            /^\s*`([^`]+)`\s+([a-zA-Z]+(?:\s*\([^)]*\))?)/i
          );

          /*
            PRIMARY KEY、KEY 等行不符合欄位格式，
            直接略過。
          */
          if (!columnMatch) {
            continue;
          }

          // 取得欄位名稱。
          const columnName = columnMatch[1];

          /*
            取得資料型態，
            並移除多餘空白、轉為小寫。
          */
          const dataType = columnMatch[2]
            .replace(/\s+/g, "")
            .toLowerCase();

          // 加入欄位順序。
          columns.push(columnName);

          // 保存欄位型態。
          types[columnName] = dataType;
        }

        /*
          建立這張表的基本資料結構。
          rows 先設為空，之後再解析 INSERT INTO。
        */
        parsed[tableName] = {
          columns,
          types,
          rows: []
        };
      }

      /*
        尋找：
        INSERT INTO `表名` VALUES (...),(...);
      */
      const insertRegex =
        /INSERT INTO\s+`([^`]+)`\s+VALUES\s*([\s\S]*?);/gi;

      /*
        逐一解析所有 INSERT INTO。
      */
      while ((match = insertRegex.exec(sqlText)) !== null) {
        // match[1] 是資料表名稱。
        const tableName = match[1];

        /*
          match[2] 是 VALUES 後方內容，
          交給 parseValueTuples() 解析。
        */
        const rows = parseValueTuples(match[2]);

        /*
          若某張表沒有被 CREATE TABLE 正規表示式抓到，
          仍先建立一個基本結構，避免程式錯誤。
        */
        if (!parsed[tableName]) {
          parsed[tableName] = {
            columns: [],
            types: {},
            rows: []
          };
        }

        /*
          ...rows 是展開運算子，
          將多筆 Row 一次加入原本的 rows。
        */
        parsed[tableName].rows.push(...rows);
      }

      // 回傳整個解析完成的資料庫物件。
      return parsed;
    }

    /*
      ==============================
      7. 排列資料表名稱
      ==============================
    */

    /*
      讓常用的 8 張表依 preferredTableOrder 顯示，
      其他額外資料表則依字母排序放在後面。
    */
    function getOrderedTableNames() {
      // 取得 database 中所有資料表名稱。
      const names = Object.keys(database);

      return [
        /*
          先加入 preferredTableOrder 中，
          且實際存在於 database 的表。
        */
        ...preferredTableOrder.filter(
          name => names.includes(name)
        ),

        /*
          再加入其他不在 preferredTableOrder 的表，
          並依名稱排序。
        */
        ...names
          .filter(
            name => !preferredTableOrder.includes(name)
          )
          .sort(
            (a, b) => a.localeCompare(b)
          )
      ];
    }

    /*
      ==============================
      8. 判斷欄位是否為數字型態
      ==============================
    */

    /*
      若欄位型態以 int、decimal、float 等開頭，
      就視為數字欄位。
    */
    function isNumericType(typeName) {
      return /^(tinyint|smallint|mediumint|int|integer|bigint|decimal|numeric|float|double|real)/i
        .test(typeName || "");
    }

    /*
      ==============================
      9. 組合 SQL 文字值
      ==============================
    */

    /*
      把一般文字包成 SQL 字串。

      例如：
      Germany → 'Germany'

      O'Brien → 'O''Brien'
    */
    function quoteSqlText(value) {
      return "'" +
        String(value).replace(/'/g, "''") +
        "'";
    }

    /*
      根據欄位型態決定 SQL 值是否加單引號。

      數字：
      50 → 50

      文字：
      Germany → 'Germany'
    */
    function sqlLiteral(value, typeName) {
      // 先轉成字串並移除前後空白。
      const trimmed = String(value).trim();

      /*
        如果欄位是數字型態，
        而使用者輸入也可以轉成有限數字，
        就直接回傳數字文字，不加單引號。
      */
      if (
        isNumericType(typeName) &&
        trimmed !== "" &&
        Number.isFinite(Number(trimmed))
      ) {
        return trimmed;
      }

      // 其他情況當作 SQL 文字。
      return quoteSqlText(trimmed);
    }

    /*
      ==============================
      10. 產生 SQL 條件與 SQL 預覽
      ==============================
    */

    /*
      判斷一個 WHERE 條件是否已填寫完整。

      回傳 true：
      這個條件可以真正加入 SQL 並執行。

      回傳 false：
      欄位未選或必要的值尚未輸入。
    */
    function isConditionReady(
      columnName,
      operator,
      firstValue,
      secondValue
    ) {
      // 沒有欄位就不是有效條件。
      if (!columnName) {
        return false;
      }

      /*
        IS NULL 與 IS NOT NULL 不需要搜尋值。
      */
      if (
        operator === "isnull" ||
        operator === "notnull"
      ) {
        return true;
      }

      // 其他比較方式需要第一個值。
      if (String(firstValue).trim() === "") {
        return false;
      }

      // BETWEEN 還需要第二個值。
      if (
        operator === "between" &&
        String(secondValue).trim() === ""
      ) {
        return false;
      }

      return true;
    }

    /*
      將一組介面條件轉成 SQL 條件文字。

      例如：
      Country = 'Germany'
      Price BETWEEN 10 AND 50
      CustomerName LIKE '%an%'

      此函式不會自行加 WHERE。
    */
    function buildConditionSql(
      columnName,
      operator,
      firstValue,
      secondValue,
      tableData
    ) {
      if (
        !isConditionReady(
          columnName,
          operator,
          firstValue,
          secondValue
        )
      ) {
        return "";
      }

      // 取得欄位型態，用來決定數字是否加單引號。
      const typeName =
        tableData.types[columnName] || "";

      switch (operator) {
        case "isnull":
          return `${columnName} IS NULL`;

        case "notnull":
          return `${columnName} IS NOT NULL`;

        case "eq":
          return (
            `${columnName} = ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        case "neq":
          return (
            `${columnName} <> ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        case "gt":
          return (
            `${columnName} > ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        case "gte":
          return (
            `${columnName} >= ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        case "lt":
          return (
            `${columnName} < ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        case "lte":
          return (
            `${columnName} <= ` +
            `${sqlLiteral(firstValue, typeName)}`
          );

        /*
          LIKE 的 % 與 _ 完全由使用者自行輸入。
        */
        case "like":
          return (
            `${columnName} LIKE ` +
            `${quoteSqlText(firstValue)}`
          );

        /*
          BETWEEN 內部本來就包含 SQL AND。

          例如：
          Price BETWEEN 10 AND 50

          這裡的 AND 是 BETWEEN 語法的一部分，
          不等於兩個 WHERE 條件之間的 AND。
        */
        case "between":
          return (
            `${columnName} BETWEEN ` +
            `${sqlLiteral(firstValue, typeName)} AND ` +
            `${sqlLiteral(secondValue, typeName)}`
          );

        default:
          return (
            `${columnName} = ` +
            `${sqlLiteral(firstValue, typeName)}`
          );
      }
    }

    /*
      根據目前介面設定組合完整 SQL。
    */
    function buildSql() {
      const tableName = tableSelect.value;

      /*
        尚未選擇有效資料表時，顯示預設 SQL。
      */
      if (!tableName || !database[tableName]) {
        sqlPreview.textContent =
          "SELECT *\\nFROM demo.資料表;";

        return "";
      }

      const tableData = database[tableName];

      /*
        先產生第一個尚未套用 NOT 的原始條件。
      */
      const rawCondition1 = buildConditionSql(
        columnSelect.value,
        operatorSelect.value,
        valueInput.value,
        valueInput2.value,
        tableData
      );

      /*
        若第一條件存在，而且使用者選擇 NOT，
        就將整個條件包成：

        NOT (原始條件)

        例如：
        NOT (Country = 'Germany')
      */
      const condition1 =
        rawCondition1 &&
        notSelect1.value === "NOT"
          ? `NOT (${rawCondition1})`
          : rawCondition1;

      /*
        先產生第二個尚未套用 NOT 的原始條件。
        未選第二欄位時會得到空字串。
      */
      const rawCondition2 = buildConditionSql(
        columnSelect2.value,
        operatorSelect2.value,
        valueInput3.value,
        valueInput4.value,
        tableData
      );

      /*
        第二條件的 NOT 與第一條件互相獨立。
      */
      const condition2 =
        rawCondition2 &&
        notSelect2.value === "NOT"
          ? `NOT (${rawCondition2})`
          : rawCondition2;

      // 取得兩條件之間使用 AND 還是 OR。
      const logicalOperator =
        logicalOperatorSelect.value;

      const orderColumn =
        orderColumnSelect.value;

      const direction =
        orderDirectionSelect.value;

      const useNumericSort =
        numericSort.value === "number";

      const lines = [
        "SELECT *",
        `FROM demo.${tableName}`
      ];

      /*
        兩個條件都有內容時，使用 AND / OR 連接。

        SQL 範例：
        WHERE (Country = 'Germany')
          OR (Country = 'France')
      */
      if (condition1 && condition2) {
        lines.push(
          `WHERE (${condition1})`,
          `  ${logicalOperator} (${condition2})`
        );
      } else if (condition1) {
        // 只有第一條件。
        lines.push(`WHERE ${condition1}`);
      } else if (condition2) {
        // 只有第二條件。
        lines.push(`WHERE ${condition2}`);
      }

      /*
        處理 ORDER BY。
      */
      if (orderColumn) {
        const expression = useNumericSort
          ? `CAST(${orderColumn} AS DECIMAL(30, 10))`
          : orderColumn;

        lines.push(
          `ORDER BY ${expression} ${direction}`
        );
      }

      const sql = lines.join("\\n") + ";";

      sqlPreview.textContent = sql;

      return sql;
    }

    /*
      ==============================
      11. 比較兩個值
      ==============================
    */

    /*
      此函式用於 JavaScript 模擬 SQL 比較。

      若欄位是數字型態，嘗試轉成 Number 比較；
      否則轉成小寫文字比較。
    */
    function compareValues(left, right, typeName) {
      /*
        SQL 中 NULL 與一般值比較不會得到 true。
        此處遇到 null 或 undefined 就回傳 null。
      */
      if (left === null || left === undefined) {
        return null;
      }

      /*
        若欄位是數字型態，
        嘗試把左右兩邊轉成數字。
      */
      if (isNumericType(typeName)) {
        const leftNumber = Number(left);
        const rightNumber = Number(right);

        /*
          只有兩邊都是有效數字才採數字比較。
        */
        if (
          Number.isFinite(leftNumber) &&
          Number.isFinite(rightNumber)
        ) {
          return {
            left: leftNumber,
            right: rightNumber
          };
        }
      }

      /*
        非數字或無法轉成數字時，
        轉成小寫文字比較，達到不分英文大小寫。
      */
      return {
        left: String(left).toLocaleLowerCase(),
        right: String(right).toLocaleLowerCase()
      };
    }

    /*
      ==============================
      12. 將 SQL LIKE 轉成正規表示式
      ==============================
    */

    /*
      JavaScript 不會直接執行 SQL LIKE，
      所以需要把 SQL 萬用字元轉成 RegExp：

      % → 任意數量字元 → .*
      _ → 任意一個字元 → .
    */
    function likePatternToRegex(pattern) {
      /*
        ^ 表示從字串開頭開始比對。
      */
      let regexText = "^";

      // 逐一處理使用者輸入的每一個字元。
      for (const character of String(pattern)) {
        /*
          SQL % 代表任意數量字元。
        */
        if (character === "%") {
          regexText += ".*";
        /*
          SQL _ 代表任意一個字元。
        */
        } else if (character === "_") {
          regexText += ".";
        } else {
          /*
            若是一般文字，
            要先跳脫 RegExp 的特殊符號，
            避免 .、*、+ 等被當成正規表示式語法。
          */
          regexText += character.replace(
            /[.*+?^${}()|[\]\\]/g,
            "\\$&"
          );
        }
      }

      /*
        $ 表示必須比對到字串結尾。
      */
      regexText += "$";

      /*
        i = 不分英文大小寫
        u = Unicode 模式
      */
      return new RegExp(regexText, "iu");
    }

    /*
      ==============================
      13. 判斷一筆 Row 是否符合 WHERE
      ==============================
    */

    /*
      Array.filter() 會對每一筆 Row 呼叫此函式。

      回傳 true：
      保留這筆資料。

      回傳 false：
      排除這筆資料。
    */
    /*
      檢查一筆 Row 是否符合一個指定條件。

      回傳 true：
      條件完整，而且這筆資料符合。

      回傳 false：
      條件完整，但這筆資料不符合。

      回傳 null：
      條件尚未啟用或填寫不完整。
    */
    function evaluateCondition(
      row,
      tableData,
      columnName,
      operator,
      firstValue,
      secondValue
    ) {
      if (
        !isConditionReady(
          columnName,
          operator,
          firstValue,
          secondValue
        )
      ) {
        return null;
      }

      const columnIndex =
        tableData.columns.indexOf(columnName);

      const cellValue = row[columnIndex];

      const typeName =
        tableData.types[columnName] || "";

      if (operator === "isnull") {
        return (
          cellValue === null ||
          cellValue === undefined
        );
      }

      if (operator === "notnull") {
        return (
          cellValue !== null &&
          cellValue !== undefined
        );
      }

      const pair = compareValues(
        cellValue,
        firstValue,
        typeName
      );

      if (pair === null) {
        return false;
      }

      switch (operator) {
        case "eq":
          return pair.left === pair.right;

        case "neq":
          return pair.left !== pair.right;

        case "gt":
          return pair.left > pair.right;

        case "gte":
          return pair.left >= pair.right;

        case "lt":
          return pair.left < pair.right;

        case "lte":
          return pair.left <= pair.right;

        case "like":
          return likePatternToRegex(firstValue)
            .test(String(cellValue));

        case "between": {
          const lowerPair = compareValues(
            cellValue,
            firstValue,
            typeName
          );

          const upperPair = compareValues(
            cellValue,
            secondValue,
            typeName
          );

          return (
            lowerPair !== null &&
            upperPair !== null &&
            lowerPair.left >= lowerPair.right &&
            upperPair.left <= upperPair.right
          );
        }

        default:
          return pair.left === pair.right;
      }
    }

    /*
      對條件 1 與條件 2 分別判斷，
      再依 AND / OR 合併結果。
    */
    function rowMatches(row, tableData) {
      /*
        使用 let 而不是 const，
        因為套用 NOT 時需要修改 true / false。
      */
      let result1 = evaluateCondition(
        row,
        tableData,
        columnSelect.value,
        operatorSelect.value,
        valueInput.value,
        valueInput2.value
      );

      let result2 = evaluateCondition(
        row,
        tableData,
        columnSelect2.value,
        operatorSelect2.value,
        valueInput3.value,
        valueInput4.value
      );

      /*
        條件 1 有效，而且選擇 NOT 時，
        使用 JavaScript 的 ! 反轉布林值。

        true  變 false
        false 變 true

        result1 !== null 很重要：
        null 代表條件未啟用，不能把 !null 當成 true。
      */
      if (
        result1 !== null &&
        notSelect1.value === "NOT"
      ) {
        result1 = !result1;
      }

      /*
        條件 2 的 NOT 以相同方式獨立處理。
      */
      if (
        result2 !== null &&
        notSelect2.value === "NOT"
      ) {
        result2 = !result2;
      }

      /*
        兩個條件都未使用：
        所有資料都保留。
      */
      if (result1 === null && result2 === null) {
        return true;
      }

      // 只有條件 1。
      if (result2 === null) {
        return result1;
      }

      // 只有條件 2。
      if (result1 === null) {
        return result2;
      }

      /*
        OR：任一條件成立即可。
      */
      if (logicalOperatorSelect.value === "OR") {
        return result1 || result2;
      }

      /*
        預設 AND：兩個條件都必須成立。
      */
      return result1 && result2;
    }

    /*
      ==============================
      14. 排序查詢結果
      ==============================
    */

    /*
      此函式模擬 SQL ORDER BY。
    */
    function sortRows(rows, tableData) {
      // 取得要排序的欄位。
      const orderColumn =
        orderColumnSelect.value;

      /*
        若未選排序欄位，
        原樣回傳 rows。
      */
      if (!orderColumn) {
        return rows;
      }

      // 取得排序欄位在 Row 中的位置。
      const index =
        tableData.columns.indexOf(orderColumn);

      /*
        ASC 使用 1。
        DESC 使用 -1。

        後面比較結果乘以 direction，
        就能反轉排序方向。
      */
      const direction =
        orderDirectionSelect.value === "DESC"
          ? -1
          : 1;

      /*
        判斷使用者是否強制要求轉成數字排序。
      */
      const forceNumber =
        numericSort.value === "number";

      // 取得排序欄位的原始資料型態。
      const typeName =
        tableData.types[orderColumn] || "";

      /*
        [...rows] 先複製陣列，
        避免 sort() 直接修改原始資料。
      */
      return [...rows].sort((a, b) => {
        // 取得 A Row 的排序值。
        const left = a[index];

        // 取得 B Row 的排序值。
        const right = b[index];

        /*
          兩邊都是 NULL，視為相同。
        */
        if (left === null && right === null) {
          return 0;
        }

        /*
          只有左邊是 NULL，讓它排到後面。
        */
        if (left === null) {
          return 1;
        }

        /*
          只有右邊是 NULL，讓它排到後面。
        */
        if (right === null) {
          return -1;
        }

        /*
          若使用者強制數字排序，
          或欄位本身是數字型態，
          嘗試用 Number 比較。
        */
        if (
          forceNumber ||
          isNumericType(typeName)
        ) {
          const leftNumber = Number(left);
          const rightNumber = Number(right);

          /*
            只有兩邊都能轉成有效數字時，
            才採用數字排序。
          */
          if (
            Number.isFinite(leftNumber) &&
            Number.isFinite(rightNumber)
          ) {
            return (
              leftNumber - rightNumber
            ) * direction;
          }
        }

        /*
          無法使用數字排序時，
          改用文字排序。
        */
        return String(left).localeCompare(
          String(right),
          undefined,
          {
            /*
              numeric: false 表示採一般文字排序。
              例如文字 "10" 可能排在 "2" 前面。
            */
            numeric: false,

            /*
              sensitivity: "base"
              表示排序時大致忽略大小寫與重音差異。
            */
            sensitivity: "base"
          }
        ) * direction;
      });
    }

    /*
      ==============================
      15. 將查詢結果顯示成 HTML Table
      ==============================
    */

    function renderTable(tableName, rows) {
      // 取得這張表的欄位與型態資訊。
      const tableData = database[tableName];

      /*
        找不到資料表時顯示錯誤訊息。
      */
      if (!tableData) {
        tableContainer.innerHTML =
          '<div class="message error">' +
          '找不到資料表。' +
          '</div>';

        return;
      }

      // 建立 <table>。
      const table =
        document.createElement("table");

      // 建立 <thead>。
      const thead =
        document.createElement("thead");

      // 建立表頭的一列 <tr>。
      const headerRow =
        document.createElement("tr");

      /*
        對每個欄位建立一個 <th>。
      */
      for (const column of tableData.columns) {
        // 建立表頭儲存格。
        const th =
          document.createElement("th");

        // 使用 textContent 安全地放入欄位名稱。
        th.textContent = column;

        // 把 <th> 加進表頭列。
        headerRow.appendChild(th);
      }

      // 把表頭列加入 <thead>。
      thead.appendChild(headerRow);

      // 把 <thead> 加入 <table>。
      table.appendChild(thead);

      // 建立表身 <tbody>。
      const tbody =
        document.createElement("tbody");

      /*
        對查詢結果中的每一筆 Row 建立 <tr>。
      */
      for (const row of rows) {
        // 建立資料列。
        const tr =
          document.createElement("tr");

        /*
          依欄位順序建立每一格 <td>。
        */
        for (
          let i = 0;
          i < tableData.columns.length;
          i += 1
        ) {
          // 建立資料儲存格。
          const td =
            document.createElement("td");

          // 取得目前欄位值。
          const value = row[i];

          /*
            null 或 undefined 顯示成文字 NULL，
            並套用灰色斜體樣式。
          */
          if (
            value === null ||
            value === undefined
          ) {
            td.textContent = "NULL";
            td.className = "null";
          } else {
            /*
              其他值全部轉成文字顯示。
            */
            td.textContent = String(value);
          }

          // 把儲存格加入資料列。
          tr.appendChild(td);
        }

        // 把資料列加入 tbody。
        tbody.appendChild(tr);
      }

      // 把 tbody 加入 table。
      table.appendChild(tbody);

      /*
        如果沒有任何結果，
        顯示「查無符合條件的資料」。
      */
      if (rows.length === 0) {
        tableContainer.innerHTML =
          '<div class="message">' +
          '查無符合條件的資料。' +
          '</div>';
      } else {
        /*
          replaceChildren(table)
          會清除原本內容，再放入新的 table。
        */
        tableContainer.replaceChildren(table);
      }

      /*
        更新狀態列：
        顯示資料表名稱、查詢結果筆數與總筆數。
      */
      rowStatus.innerHTML =
        `資料表：<strong>${tableName}</strong>　` +
        `結果：<strong>${rows.length}</strong> / ` +
        `<strong>${tableData.rows.length}</strong> 筆`;
    }

    /*
      ==============================
      16. 執行查詢
      ==============================
    */

    function executeQuery() {
      // 取得目前資料表名稱。
      const tableName = tableSelect.value;

      // 取得目前資料表資料。
      const tableData = database[tableName];

      /*
        資料表不存在就停止。
      */
      if (!tableData) {
        return;
      }

      /*
        先更新畫面上的 SQL 預覽，
        並把這次真正執行的 SQL 保存起來。
      */
      lastExecutedSql = buildSql();

      /*
        filter() 對每一筆 Row 呼叫 rowMatches()，
        只保留符合 WHERE 條件的資料。
      */
      const filtered = tableData.rows.filter(
        row => rowMatches(row, tableData)
      );

      /*
        將篩選結果交給 sortRows() 模擬 ORDER BY。
      */
      currentResult = sortRows(
        filtered,
        tableData
      );

      /*
        把結果顯示到畫面。
      */
      renderTable(
        tableName,
        currentResult
      );
    }

    /*
      ==============================
      17. 顯示全部資料
      ==============================
    */

    function showAllRows() {
      // 取得目前資料表名稱。
      const tableName = tableSelect.value;

      // 取得資料表資料。
      const tableData = database[tableName];

      /*
        找不到表就停止。
      */
      if (!tableData) {
        return;
      }

      // 清空第一個搜尋值。
      valueInput.value = "";

      // 清空 BETWEEN 第二個值。
      valueInput2.value = "";

      /*
        顯示全部時清除第一條件的 NOT。
      */
      notSelect1.value = "";

      /*
        清除第二個 WHERE 條件，
        並把第二條件的 NOT 恢復成一般條件。
      */
      columnSelect2.value = "";
      notSelect2.value = "";
      valueInput3.value = "";
      valueInput4.value = "";
      operatorSelect2.value = "like";
      logicalOperatorSelect.value = "AND";

      // 清除 ORDER BY 欄位。
      orderColumnSelect.value = "";

      // 將第一個比較條件恢復為 LIKE。
      operatorSelect.value = "like";

      // 排序方式恢復為依原欄位型態。
      numericSort.value = "normal";

      /*
        更新兩組 WHERE 輸入框狀態與 SQL 預覽。
      */
      updateOperatorInputs();
      updateSecondOperatorInputs();

      /*
        複製此資料表的全部 Row。
      */
      currentResult = [...tableData.rows];

      /*
        保存「顯示全部」實際對應的 SQL。
        此時通常只有 SELECT 與 FROM，不會有 WHERE。
      */
      lastExecutedSql = buildSql();

      // 顯示全部資料。
      renderTable(
        tableName,
        currentResult
      );
    }

    /*
      ==============================
      18. 產生欄位下拉選單
      ==============================
    */

    /*
      每次使用者更換資料表，
      都要重新建立 WHERE 與 ORDER BY 的欄位選項。
    */
    function populateColumnOptions() {
      const tableName = tableSelect.value;
      const tableData = database[tableName];

      // 清空第一個 WHERE 欄位。
      columnSelect.innerHTML = "";

      // 第二個 WHERE 欄位預設可以選擇不使用。
      columnSelect2.innerHTML =
        '<option value="">不使用第二條件</option>';

      orderColumnSelect.innerHTML =
        '<option value="">不排序</option>';

      if (!tableData) {
        return;
      }

      /*
        每個欄位分別建立三個 option：
        第一條件、第二條件、ORDER BY 各一個。
      */
      for (const column of tableData.columns) {
        const typeName =
          tableData.types[column] || "unknown";

        const option1 =
          document.createElement("option");

        option1.value = column;
        option1.textContent =
          `${column} (${typeName})`;

        columnSelect.appendChild(option1);

        const option2 =
          document.createElement("option");

        option2.value = column;
        option2.textContent =
          `${column} (${typeName})`;

        columnSelect2.appendChild(option2);

        const orderOption =
          document.createElement("option");

        orderOption.value = column;
        orderOption.textContent =
          `${column} (${typeName})`;

        orderColumnSelect.appendChild(
          orderOption
        );
      }

      columnSelect.disabled = false;

      /*
        第一個 WHERE 條件固定存在，
        因此資料載入後可直接使用條件 1 的 NOT。
      */
      notSelect1.disabled = false;

      operatorSelect.disabled = false;
      valueInput.disabled = false;

      /*
        第二欄位選單可以使用，
        但 AND / OR 與第二組輸入元件要等選欄位後才啟用。
      */
      columnSelect2.disabled = false;

      orderColumnSelect.disabled = false;
      orderDirectionSelect.disabled = false;
      numericSort.disabled = false;
      runButton.disabled = false;
      showAllButton.disabled = false;
      exportButton.disabled = false;

      // 第一條件依欄位型態決定預設比較方式。
      operatorSelect.value = isNumericType(
        tableData.types[columnSelect.value]
      )
        ? "eq"
        : "like";

      /*
        每次切換資料表時，
        兩組 NOT 都恢復為一般條件。
      */
      notSelect1.value = "";
      notSelect2.value = "";

      // 第二條件預設關閉。
      columnSelect2.value = "";
      operatorSelect2.value = "like";
      logicalOperatorSelect.value = "AND";

      updateOperatorInputs();
      updateSecondOperatorInputs();

      showAllRows();
    }

    /*
      ==============================
      19. 更新兩組 WHERE 輸入框狀態
      ==============================
    */

    /*
      更新第一個 WHERE 條件。
    */
    function updateOperatorInputs() {
      const operator = operatorSelect.value;

      const noValueNeeded =
        operator === "isnull" ||
        operator === "notnull";

      const needsSecondValue =
        operator === "between";

      valueInput.disabled =
        noValueNeeded ||
        !tableSelect.value;

      value2Field.hidden =
        !needsSecondValue;

      valueInput2.disabled =
        !needsSecondValue;

      buildSql();
    }

    /*
      更新第二個 WHERE 條件。

      未選第二欄位時，
      AND / OR、比較方式及搜尋值全部停用。
    */
    function updateSecondOperatorInputs() {
      const hasSecondColumn =
        columnSelect2.value !== "";

      const operator =
        operatorSelect2.value;

      const noValueNeeded =
        operator === "isnull" ||
        operator === "notnull";

      const needsSecondValue =
        operator === "between";

      logicalOperatorSelect.disabled =
        !hasSecondColumn;

      /*
        第二條件沒有選欄位時，
        NOT 2 也不能使用。
      */
      notSelect2.disabled =
        !hasSecondColumn;

      operatorSelect2.disabled =
        !hasSecondColumn;

      valueInput3.disabled =
        !hasSecondColumn ||
        noValueNeeded;

      value4Field.hidden =
        !hasSecondColumn ||
        !needsSecondValue;

      valueInput4.disabled =
        !hasSecondColumn ||
        !needsSecondValue;

      buildSql();
    }

    /*
      ==============================
      20. 產生資料表下拉選單
      ==============================
    */

    function populateTableSelect() {
      // 取得排序後的資料表名稱。
      const names = getOrderedTableNames();

      // 清空原本選項。
      tableSelect.innerHTML = "";

      /*
        為每張資料表建立 option。
      */
      for (const name of names) {
        const option =
          document.createElement("option");

        // option 的值是資料表名稱。
        option.value = name;

        // 畫面顯示資料表名稱。
        option.textContent = name;

        // 加進下拉選單。
        tableSelect.appendChild(option);
      }

      /*
        若沒有任何資料表，
        保持 disabled。
      */
      tableSelect.disabled =
        names.length === 0;

      /*
        有資料表時，
        預設選第一張表並建立欄位選項。
      */
      if (names.length > 0) {
        tableSelect.value = names[0];
        populateColumnOptions();
      }
    }

    /*
      ==============================
      21. 使用讀到的 SQL 文字
      ==============================
    */

    /*
      sqlText：
      demo.sql 的完整文字。

      sourceName：
      顯示給使用者看的來源名稱。
    */
    function useSqlText(sqlText, sourceName) {
      /*
        解析 CREATE TABLE 與 INSERT INTO。
      */
      const parsed = parseSqlDump(sqlText);

      // 計算解析出幾張資料表。
      const tableCount =
        Object.keys(parsed).length;

      /*
        完全找不到資料表時丟出錯誤。
      */
      if (tableCount === 0) {
        throw new Error(
          "找不到 CREATE TABLE 或 INSERT INTO 資料。"
        );
      }

      // 將解析結果保存到全域 database。
      database = parsed;

      // 產生資料表下拉選單。
      populateTableSelect();

      /*
        顯示讀檔成功訊息。
      */
      loadStatus.innerHTML =
        `已讀取 <strong>${sourceName}</strong>，找到 ` +
        `<strong>${tableCount}</strong> 張資料表。`;
    }

    /*
      ==============================
      22. 自動讀取同資料夾的 demo.sql
      ==============================
    */

    /*
      async 表示此函式中可以使用 await，
      等待 fetch() 完成。
    */
    async function loadRelativeSqlFile() {
      /*
        開始讀取前先停用所有查詢控制元件，
        避免資料還沒載入就操作。
      */
      tableSelect.disabled = true;
      columnSelect.disabled = true;

      /*
        重新讀檔期間停用兩組 NOT，
        避免資料尚未載入就操作。
      */
      notSelect1.disabled = true;
      notSelect2.disabled = true;

      operatorSelect.disabled = true;
      valueInput.disabled = true;
      valueInput2.disabled = true;

      /*
        讀檔期間停用 AND / OR 與第二個 WHERE 條件。
      */
      logicalOperatorSelect.disabled = true;
      columnSelect2.disabled = true;
      operatorSelect2.disabled = true;
      valueInput3.disabled = true;
      valueInput4.disabled = true;

      orderColumnSelect.disabled = true;
      orderDirectionSelect.disabled = true;
      numericSort.disabled = true;
      runButton.disabled = true;
      showAllButton.disabled = true;
      exportButton.disabled = true;

      // 顯示載入訊息。
      tableContainer.innerHTML =
        '<div class="message">' +
        '正在讀取 demo.sql……' +
        '</div>';

      // 更新左側載入狀態。
      loadStatus.textContent =
        "正在讀取 ./demo.sql……";

      // 清空右側筆數狀態。
      rowStatus.textContent = "";

      /*
        try 中放可能發生錯誤的讀檔流程。
      */
      try {
        /*
          fetch("./demo.sql")
          會讀取與 index.html 同資料夾的 demo.sql。

          cache: "no-store"
          表示不要使用舊快取，重新取得檔案。
        */
        const response = await fetch(
          "./demo.sql",
          {
            cache: "no-store"
          }
        );

        /*
          HTTP 狀態不是成功時，
          主動丟出錯誤。
        */
        if (!response.ok) {
          throw new Error(
            `HTTP ${response.status}`
          );
        }

        /*
          將 HTTP 回應內容讀成純文字。
        */
        const sqlText =
          await response.text();

        /*
          解析並使用 SQL 文字。
        */
        useSqlText(
          sqlText,
          "./demo.sql"
        );

        /*
          自動讀檔成功，
          隱藏手動選檔區。
        */
        fileFallback.style.display = "none";
      } catch (error) {
        /*
          自動讀檔失敗時進入 catch。
        */

        // 清空資料庫。
        database = {};

        // 下拉選單顯示失敗。
        tableSelect.innerHTML =
          '<option value="">' +
          '讀取失敗' +
          '</option>';

        // 顯示操作提示。
        tableContainer.innerHTML =
          '<div class="message error">' +
          "無法自動讀取 demo.sql。請用 VS Code Live Server 開啟，" +
          "或在上方手動選擇 demo.sql。" +
          "</div>";

        // 顯示實際錯誤訊息。
        loadStatus.textContent =
          `讀取失敗：${error.message}`;

        /*
          顯示手動選檔區。
        */
        fileFallback.style.display = "flex";
      }
    }

    /*
      ==============================
      23. 匯出目前結果為 Excel
      ==============================
    */

    /*
      清理工作表名稱中 Excel 不允許出現的字元。

      Excel 工作表名稱不能包含：
      \ / ? * [ ] :

      而且工作表名稱最多只能有 31 個字元。
    */
    function makeSafeSheetName(name) {
      const safeName = String(name)
        .replace(/[\\/?*[\]:]/g, "_")
        .slice(0, 31);

      /*
        如果清理後變成空字串，
        就使用預設名稱 QueryResult。
      */
      return safeName || "QueryResult";
    }

    /*
      清理 Windows 檔名中不允許使用的特殊字元。

      例如：
      \ / : * ? " < > |
    */
    function makeSafeFileName(name) {
      const safeName = String(name)
        .replace(/[\\/:*?"<>|]/g, "_")
        .trim();

      return safeName || "SQL查詢結果";
    }

    /*
      將目前畫面中已執行完成的查詢結果輸出成 .xlsx。

      Excel 內容結構：

      第 1 列：SELECT ...
      第 2 列：FROM ...
      第 3 列：WHERE ...（若有）
      第 4 列：ORDER BY ...（若有）
      下一列：空白
      再下一列：資料欄位名稱
      後續列：目前查詢結果
    */
    function exportCurrentResultToExcel() {
      /*
        檢查 SheetJS 是否成功載入。

        如果使用者沒有網路，
        或 CDN 被瀏覽器、公司網路阻擋，
        window.XLSX 可能不存在。
      */
      if (typeof XLSX === "undefined") {
        alert(
          "Excel 匯出套件載入失敗。\\n" +
          "請確認目前可以連上網路，再重新整理頁面。"
        );
        return;
      }

      // 取得目前資料表名稱。
      const tableName = tableSelect.value;

      // 取得目前資料表的欄位資訊。
      const tableData = database[tableName];

      /*
        若尚未載入資料表，
        就不能進行匯出。
      */
      if (!tableName || !tableData) {
        alert("目前沒有可以匯出的資料表。");
        return;
      }

      /*
        使用最後一次真正執行過的 SQL。

        正常情況下 lastExecutedSql 一定有值；
        若因特殊情況為空，才使用 buildSql() 產生目前 SQL。
      */
      const executedSql =
        lastExecutedSql || buildSql();

      /*
        將 SQL 依照換行拆開。

        例如：
        [
          "SELECT *",
          "FROM demo.customers",
          "WHERE Country = 'Germany'",
          "ORDER BY CustomerID ASC;"
        ]
      */
      const sqlLines = executedSql.split(/\r?\n/);

      /*
        建立要寫進 Excel 的二維陣列。

        SheetJS 的 aoa_to_sheet()：
        AOA = Array Of Arrays，也就是二維陣列。
      */
      const excelRows = [];

      /*
        每一行 SQL 各放在 Excel 的一列，
        並先放在第一欄 A。
      */
      for (const sqlLine of sqlLines) {
        excelRows.push([sqlLine]);
      }

      /*
        SQL 與資料表之間空一列，
        讓 Excel 比較容易閱讀。
      */
      excelRows.push([]);

      /*
        加入資料表欄位名稱。
        例如：
        CustomerID、CustomerName、Country
      */
      excelRows.push([...tableData.columns]);

      /*
        加入目前畫面中的查詢結果。

        currentResult 已經是：
        1. 經過 WHERE 篩選
        2. 經過 ORDER BY 排序
        3. 實際顯示在畫面上的資料
      */
      for (const row of currentResult) {
        /*
          將 JavaScript undefined 轉成 null，
          避免 Excel 出現不明內容。
        */
        const excelRow = row.map(value =>
          value === undefined ? null : value
        );

        excelRows.push(excelRow);
      }

      /*
        將二維陣列轉換成 SheetJS 工作表。
      */
      const worksheet =
        XLSX.utils.aoa_to_sheet(excelRows);

      /*
        計算最後一個欄位的位置。

        如果資料表只有一欄，最後欄索引就是 0；
        如果有 5 欄，最後欄索引就是 4。
      */
      const lastColumnIndex = Math.max(
        tableData.columns.length - 1,
        0
      );

      /*
        將每一列 SQL 從 A 欄合併到資料表最後一欄。

        例如資料表有 6 個欄位：
        SELECT 那一列會合併 A1:F1，
        FROM 那一列會合併 A2:F2。
      */
      if (lastColumnIndex > 0) {
        worksheet["!merges"] = sqlLines.map(
          (_, rowIndex) => ({
            s: {
              r: rowIndex,
              c: 0
            },
            e: {
              r: rowIndex,
              c: lastColumnIndex
            }
          })
        );
      }

      /*
        自動估算每個資料欄的寬度。

        最小寬度 10，
        最大寬度 40，
        避免欄位太窄或因長文字變得過寬。
      */
      worksheet["!cols"] = tableData.columns.map(
        (columnName, columnIndex) => {
          /*
            先用欄位名稱長度當作初始寬度。
          */
          let maximumLength =
            String(columnName).length;

          /*
            比較目前結果中該欄每個值的文字長度。
          */
          for (const row of currentResult) {
            const value = row[columnIndex];

            const valueText =
              value === null || value === undefined
                ? "NULL"
                : String(value);

            maximumLength = Math.max(
              maximumLength,
              valueText.length
            );
          }

          /*
            wch 表示約等於多少個英文字元寬度。
          */
          return {
            wch: Math.min(
              Math.max(maximumLength + 2, 10),
              40
            )
          };
        }
      );

      /*
        SQL 每一列稍微增加高度，
        讓最上方查詢條件更容易閱讀。
      */
      worksheet["!rows"] = sqlLines.map(() => ({
        hpt: 20
      }));

      /*
        SQL 列數之後：
        先空一列，再下一列才是欄位表頭。

        因為 SheetJS 使用 0 起算索引，
        所以表頭索引為 sqlLines.length + 1。
      */
      const headerRowIndex =
        sqlLines.length + 1;

      /*
        在 Excel 的欄位標題與資料範圍加入自動篩選箭頭。
      */
      worksheet["!autofilter"] = {
        ref: XLSX.utils.encode_range({
          s: {
            r: headerRowIndex,
            c: 0
          },
          e: {
            r: headerRowIndex + currentResult.length,
            c: lastColumnIndex
          }
        })
      };

      /*
        建立一個新的 Excel 活頁簿。
      */
      const workbook =
        XLSX.utils.book_new();

      /*
        工作表名稱使用目前資料表名稱，
        並先清理 Excel 不允許的字元。
      */
      const sheetName =
        makeSafeSheetName(tableName);

      /*
        把 worksheet 加進 workbook。
      */
      XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        sheetName
      );

      /*
        建立目前時間，放進檔名中，
        避免重複匯出時檔名完全相同。

        例如：
        20260622_143025
      */
      const now = new Date();

      const timeText = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
        "_",
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ].join("");

      /*
        最終檔名例如：
        customers_查詢結果_20260622_143025.xlsx
      */
      const fileName =
        makeSafeFileName(
          `${tableName}_查詢結果_${timeText}`
        ) + ".xlsx";

      /*
        產生真正的 .xlsx 檔案，
        並交給瀏覽器下載。
      */
      XLSX.writeFile(
        workbook,
        fileName,
        {
          compression: true
        }
      );
    }

    /*
      ==============================
      24. 綁定畫面事件
      ==============================
    */

    /*
      當使用者更換資料表時，
      重新產生欄位選單並顯示該表資料。
    */
    tableSelect.addEventListener(
      "change",
      populateColumnOptions
    );

    /*
      當使用者更換 WHERE 欄位時，
      根據欄位型態選擇較適合的預設運算子。
    */
    columnSelect.addEventListener(
      "change",
      () => {
        // 取得目前資料表。
        const tableData =
          database[tableSelect.value];

        // 取得目前欄位型態。
        const typeName =
          tableData?.types[columnSelect.value] || "";

        /*
          數字欄位預設使用 "="；
          文字欄位預設使用 LIKE。
        */
        operatorSelect.value =
          isNumericType(typeName)
            ? "eq"
            : "like";

        // 更新輸入框狀態與 SQL 預覽。
        updateOperatorInputs();
      }
    );

    /*
      條件 1 的 NOT 改變時，
      立即更新畫面上的 SQL 預覽。

      真正資料仍要等使用者按下「執行查詢」才會更新。
    */
    notSelect1.addEventListener(
      "change",
      buildSql
    );

    /*
      當第一個比較方式改變時，
      更新第一組輸入框狀態。
    */
    operatorSelect.addEventListener(
      "change",
      updateOperatorInputs
    );

    /*
      當第二個 WHERE 欄位改變時，
      依欄位型態預設使用 = 或 LIKE。
    */
    columnSelect2.addEventListener(
      "change",
      () => {
        const tableData =
          database[tableSelect.value];

        if (columnSelect2.value) {
          const typeName =
            tableData?.types[columnSelect2.value] || "";

          operatorSelect2.value =
            isNumericType(typeName)
              ? "eq"
              : "like";
        } else {
          /*
            取消第二欄位時，
            同時清除 NOT 2 與第二條件的輸入值。
          */
          notSelect2.value = "";
          operatorSelect2.value = "like";
          valueInput3.value = "";
          valueInput4.value = "";
        }

        updateSecondOperatorInputs();
      }
    );

    /*
      AND / OR 改變時更新 SQL 預覽。
    */
    logicalOperatorSelect.addEventListener(
      "change",
      buildSql
    );

    /*
      條件 2 的 NOT 改變時，
      立即更新 SQL 預覽。
    */
    notSelect2.addEventListener(
      "change",
      buildSql
    );

    /*
      第二個比較方式改變時，
      更新第二組輸入框狀態。
    */
    operatorSelect2.addEventListener(
      "change",
      updateSecondOperatorInputs
    );

    /*
      第二條件第一個搜尋值輸入時更新 SQL。
    */
    valueInput3.addEventListener(
      "input",
      buildSql
    );

    /*
      第二條件 BETWEEN 第二值輸入時更新 SQL。
    */
    valueInput4.addEventListener(
      "input",
      buildSql
    );

    /*
      第一個搜尋值輸入時，
      即時更新 SQL 預覽。
    */
    valueInput.addEventListener(
      "input",
      buildSql
    );

    /*
      BETWEEN 第二個值輸入時，
      即時更新 SQL 預覽。
    */
    valueInput2.addEventListener(
      "input",
      buildSql
    );

    /*
      ORDER BY 欄位改變時，
      即時更新 SQL 預覽。
    */
    orderColumnSelect.addEventListener(
      "change",
      buildSql
    );

    /*
      ASC / DESC 改變時，
      即時更新 SQL 預覽。
    */
    orderDirectionSelect.addEventListener(
      "change",
      buildSql
    );

    /*
      排序方式改變時，
      即時更新 SQL 預覽。
    */
    numericSort.addEventListener(
      "change",
      buildSql
    );

    /*
      按下「執行查詢」時，
      執行 JavaScript 模擬查詢。
    */
    runButton.addEventListener(
      "click",
      executeQuery
    );

    /*
      按下「顯示全部」時，
      清除條件並顯示全部 Row。
    */
    showAllButton.addEventListener(
      "click",
      showAllRows
    );

    /*
      按下「匯出目前結果 Excel」時，
      將目前實際顯示的資料與其 SQL 條件輸出成 .xlsx。
    */
    exportButton.addEventListener(
      "click",
      exportCurrentResultToExcel
    );

    /*
      按下「重新讀取」時，
      再次 fetch("./demo.sql")。
    */
    reloadButton.addEventListener(
      "click",
      loadRelativeSqlFile
    );

    /*
      使用者手動選擇 .sql 檔案時執行。
    */
    fileInput.addEventListener(
      "change",
      async () => {
        // 取得使用者選擇的第一個檔案。
        const file = fileInput.files[0];

        /*
          沒有選檔案時停止。
        */
        if (!file) {
          return;
        }

        try {
          /*
            file.text() 會把本機檔案內容讀成文字。
          */
          const sqlText = await file.text();

          /*
            使用所選檔案內容，
            並在狀態列顯示檔名。
          */
          useSqlText(
            sqlText,
            file.name
          );
        } catch (error) {
          /*
            手動讀檔失敗時顯示錯誤。
          */
          loadStatus.textContent =
            `檔案讀取失敗：${error.message}`;
        }
      }
    );

    /*
      ==============================
      25. 頁面啟動
      ==============================
    */

    /*
      JavaScript 載入到這裡時，
      立即嘗試讀取同資料夾中的 demo.sql。
    */
    loadRelativeSqlFile();
  </script>
</body>
</html>
