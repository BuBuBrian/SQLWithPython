<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SQLWithPython – 查詢工作室</title>
  <!-- 引入與 index__.html 相同的自訂 style.css (質感維持) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- 額外：Bootstrap 5 與 Select2，只用其互動元件，不覆蓋原本排版 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
  <style>
    /* 不干擾原本 style.css，只針對新元件做細部調整 */
    .select2-container--bootstrap-5 .select2-selection{min-height:2.25rem;padding:.25rem .5rem;border-radius:.375rem}
    .sidebar{width:220px;background:#fff;border-right:1px solid #e5e7eb}
    .sidebar h3{font-size:1rem;margin-top:1rem;padding-left:1rem}
    .sidebar .nav-link{display:block;padding:.25rem 1rem;color:#374151;font-size:.875rem}
    .sidebar .nav-link.active{color:#1d4ed8;font-weight:600}
    .content-wrapper{margin-left:220px;padding:1.5rem}
    pre.sql{background:#f8fafc;border:1px solid #e2e8f0;border-radius:.5rem;padding:1rem;font-family:"JetBrains Mono",monospace;font-size:.875rem;white-space:pre-wrap}
  </style>
</head>
<body>
<!-- ====== Top Bar（沿用 index__ 視覺） ====== -->
<header class="site-header">
  <div>
    <p class="eyebrow">SQLWithPython</p>
    <h1>Web SQL 查詢工具 – 進階版</h1>
    <p class="subtitle">支援下拉式查詢、雙語切換。</p>
  </div>
  <div class="d-flex gap-2 align-items-center">
    <select id="langSel" class="form-select form-select-sm">
      <option value="zh-TW">繁體中文</option>
      <option value="en">English</option>
    </select>
  </div>
</header>

<!-- ====== SideBar：資料庫 / 表 / 視圖 ====== -->
<aside class="sidebar position-fixed top-0 bottom-0">
  <h3 data-i18n="side_db">資料庫</h3>
  <nav id="dbNav" class="mb-3"></nav>
  <h3 data-i18n="side_tables">資料表</h3>
  <nav id="tableNav" class="mb-3"></nav>
  <h3 data-i18n="side_views">視圖</h3>
  <nav id="viewNav" class="mb-3"></nav>
</aside>

<!-- ====== 主內容區 ====== -->
<main class="content-wrapper">
  <!-- 模式切換 -->
  <ul class="nav nav-tabs mb-3" id="modeTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" id="raw-tab" data-bs-toggle="tab" data-bs-target="#raw" type="button" role="tab" data-i18n="tab_raw">原始 SQL</button></li>
    <li class="nav-item"><button class="nav-link" id="form-tab" data-bs-toggle="tab" data-bs-target="#form" type="button" role="tab" data-i18n="tab_form">表單 SQL</button></li>
  </ul>
  <div class="tab-content" id="tabContent">
    <!-- Raw -->
    <div class="tab-pane fade show active" id="raw" role="tabpanel">
      <label class="form-label" data-i18n="editor_label">編輯器</label>
      <textarea id="rawArea" class="form-control mb-3" rows="6">SELECT * FROM customers LIMIT 10;</textarea>
    </div>
    <!-- Form -->
    <div class="tab-pane fade" id="form" role="tabpanel">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">SELECT</label>
          <select id="selSelect" class="form-select select2" multiple></select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">FROM</label>
          <select id="selFrom" class="form-select select2"></select>
        </div>
      </div>
      <!-- WHERE -->
      <div class="border rounded p-3 mb-3 bg-light">
        <label class="form-label fw-semibold mb-2">WHERE</label>
        <div class="row g-2 align-items-center mb-2 condition" data-idx="0">
          <div class="col-3"><select class="form-select select2 col-col"></select></div>
          <div class="col-2"><select class="form-select op"><option value="=">=</option><option value=">">&gt;</option><option value="<"><</option><option value="LIKE">LIKE</option></select></div>
          <div class="col-7"><input type="text" class="form-control val" data-i18n-placeholder="placeholder_value" placeholder="值"></div>
        </div>
        <div class="row g-2 align-items-center mb-2">
          <div class="col-2 offset-3"><select id="logicSel" class="form-select"><option value="AND">AND</option><option value="OR">OR</option></select></div>
        </div>
        <div class="row g-2 align-items-center condition" data-idx="1">
          <div class="col-3"><select class="form-select select2 col-col"></select></div>
          <div class="col-2"><select class="form-select op"><option value="=">=</option><option value=">">&gt;</option><option value="<"><</option><option value="LIKE">LIKE</option></select></div>
          <div class="col-7"><input type="text" class="form-control val" data-i18n-placeholder="placeholder_value" placeholder="值"></div>
        </div>
      </div>
      <!-- ORDER BY -->
      <div class="row g-3 mb-3">
        <div class="col-md-6"><label class="form-label fw-semibold">ORDER BY</label><select id="selOrder" class="form-select select2"></select></div>
        <div class="col-md-3"><label class="form-label fw-semibold">方向</label><select id="selDir" class="form-select"><option value="ASC">ASC</option><option value="DESC">DESC</option></select></div>
      </div>
    </div>
  </div>
  <div class="text-end mb-3"><button id="runBtn" class="btn btn-primary" data-i18n="btn_run">執行查詢</button></div>

  <!-- 結果顯示 -->
  <section id="resultBox" class="d-none">
    <h4 data-i18n="gen_sql_title">產生 SQL</h4>
    <pre id="sqlShow" class="sql"></pre>
    <h4 class="mt-3" data-i18n="query_results_title">查詢結果</h4>
    <div class="table-responsive">
      <table id="resTable" class="table table-bordered table-striped small"></table>
    </div>
  </section>
</main>

<!-- ====== Scripts ====== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
/* --- i18n 文案 --- */
const T={
  'en':{tab_raw:'Raw SQL',tab_form:'Form SQL',editor_label:'Editor',btn_run:'Run Query',placeholder_value:'Value',gen_sql_title:'Generated SQL',query_results_title:'Query Results'},
  'zh-TW':{tab_raw:'原始 SQL',tab_form:'表單 SQL',editor_label:'編輯器',btn_run:'執
