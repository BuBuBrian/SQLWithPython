            'execution_time': '執行時間：0.045秒'
        }
    };

    window.changeLanguage = function(lang) {
        if (!translations[lang]) return;
        const t = translations[lang];

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) {
                el.textContent = t[key];
            }
        });

        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (t[key]) {
                el.placeholder = t[key];
            }
        });

        localStorage.setItem('sql_architect_lang', lang);
    };

            const generatedSqlDisplay = document.getElementById('generated-sql-display');
            const resultsTbody = document.getElementById('results-tbody');
            const rawSqlInput = document.getElementById('raw-sql-input');
            const langSelector = document.getElementById('lang-selector');

            // Initialize Language
            const savedLang = localStorage.getItem('sql_architect_lang') || 'zh-TW';
            langSelector.value = savedLang;
            window.changeLanguage(savedLang);

            langSelector.addEventListener('change', (e) => {
                window.changeLanguage(e.target.value);
            });

            let currentMode = 'raw'; // 'raw' or 'form'

            // Tab Switching Logic
            function switchTab(mode) {
                currentMode = mode;
                if (mode === 'raw') {
                    tabRaw.classList.replace('nav-tab-inactive', 'nav-tab-active');
                    tabForm.classList.replace('nav-tab-active', 'nav-tab-inactive');
                    panelRaw.classList.remove('hidden');
                    panelForm.classList.add('hidden');
                } else {
                    tabForm.classList.replace('nav-tab-inactive', 'nav-tab-active');
                    tabRaw.classList.replace('nav-tab-active', 'nav-tab-inactive');
                    panelForm.classList.remove('hidden');
                    panelRaw.classList.add('hidden');
                }
            }

            tabRaw.addEventListener('click', () => switchTab('raw'));
            tabForm.addEventListener('click', () => switchTab('form'));

            // Basic Form SQL Builder (Mockup for display)
            function buildFormSql() {
                // In a real app, you'd extract values from the form inputs
                return `SELECT *\nFROM users\nWHERE status = 'active'\n  AND created_at > '2023-01-01'\nORDER BY created_at DESC;`;
            }

            // Mock Data Generator
            const mockData = [
                { id: 1, name: 'Alice Smith', email: 'alice@example.com', status: 'active', created_at: '2023-10-01 10:00:00' },
                { id: 2, name: 'Bob Jones', email: 'bob@example.com', status: 'active', created_at: '2023-10-02 11:30:00' },
                { id: 3, name: 'Charlie Brown', email: 'charlie@example.com', status: 'inactive', created_at: '2023-10-05 09:15:00' }
            ];

            // Run Query Logic
            runBtn.addEventListener('click', () => {
                const currentLang = langSelector.value;
                const t = translations[currentLang];

                runBtn.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin">sync</span> <span data-i18n="btn_running">${t.btn_running}</span>`;
                runBtn.disabled = true;

                // Simulate network request
                setTimeout(() => {
                    let executedSql = '';
                    if (currentMode === 'raw') {
                        executedSql = rawSqlInput.value;
                    } else {
                        executedSql = buildFormSql();
                    }

                    // Display SQL
                    generatedSqlDisplay.textContent = executedSql;

                    // Render mock results
                    resultsTbody.innerHTML = '';
                    mockData.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-slate-50 transition-colors';
                        tr.innerHTML = `
                            <td class="p-3 text-slate-600 font-code-md text-[13px]">${row.id}</td>
                            <td class="p-3 text-slate-800 font-medium">${row.name}</td>
                            <td class="p-3 text-slate-600">${row.email}</td>
                            <td class="p-3">
                                <span class="px-2 py-1 rounded text-label-sm ${row.status === 'active' ? 'bg-[#e6f4ea] text-[#137333]' : 'bg-slate-100 text-slate-600'}">
                                    ${row.status}
                                </span>
                            </td>
                            <td class="p-3 text-slate-500 text-[13px]">${row.created_at}</td>
                        `;
                        resultsTbody.appendChild(tr);
                    });

                    // Show section
                    resultsSection.classList.remove('hidden');
                    // Small delay to allow display:block to apply before animating opacity
                    setTimeout(() => {
                        resultsSection.classList.remove('opacity-0');
                    }, 10);

                    // Reset button
                    runBtn.innerHTML = `<span class="material-symbols-outlined text-[18px]">play_arrow</span> <span data-i18n="btn_run">${t.btn_run}</span>`;
                    runBtn.disabled = false;
                    
                }, 600); // Simulated 600ms latency
            });
        });
    </script>
</body></html>
