<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SQLWithPython — Query Studio</title>
  <!-- Bootstrap 5 + Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <style>
    /* === Palette (原本質感版) === */
    :root{
      --indi:#4f46e5;           /* indigo-600 */
      --indi-dark:#4338ca;      /* indigo-700 */
      --bg-light:#f8f9ff;       /* slate-50 近似 */
    }
    body{background:var(--bg-light);} 
    pre.sql{background:#f8fafc;border:1px solid #e2e8f0;border-radius:.5rem;padding:1rem;font-family:"JetBrains Mono",monospace;font-size:.875rem;white-space:pre-wrap}
    .select2-container .select2-selection{min-height:2.4rem;padding:.25rem .5rem;border:1px solid #ced4da;border-radius:.375rem}
    .select2-container--bootstrap-5.select2-container--focus .select2-selection{border-color:var(--indi);box-shadow:0 0 0 .25rem rgba(79,70,229,.25)}
  </style>
</head>
<body>
<!-- TopBar (保留原本漸層 + 語言切換) -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background:linear-gradient(90deg,#1e293b 0%,var(--indi) 100%)">
  <div class="container-xl">
    <a class="navbar-brand fw-semibold" href="#">SQLWithPython</a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <select id="langSel" class="form-select form-select-sm bg-light">
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
</nav>

<div class="container-xl my-4">
  <!-- Mode Tabs -->
  <ul class="nav nav-tabs" id="modeTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="raw-tab" data-bs-toggle="tab" data-bs-target="#raw" type="button" role="tab" aria-controls="raw" aria-selected="true" data-i18n="tab_raw">原始 SQL</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="form-tab" data-bs-toggle="tab" data-bs-target="#form" type="button" role="tab" aria-controls="form" aria-selected="false" data-i18n="tab_form">表單 SQL</button>
    </li>
  </ul>
  <div class="tab-content bg-white border border-top-0 rounded-bottom shadow-sm p-4" id="tabContent">
    <!-- Raw SQL -->
    <div class="tab-pane fade show active" id="raw" role="tabpanel" aria-labelledby="raw-tab">
      <label class="form-label" data-i18n="editor_label">編輯器</label>
      <textarea id="rawArea" class="form-control mb-3" rows="6">SELECT * FROM customers LIMIT 10;</textarea>
    </div>
    <!-- Form SQL -->
    <div class="tab-pane fade" id="form" role="tabpanel" aria-labelledby="form-tab">
      <!-- SELECT / FROM -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">SELECT</label>
          <select id="selSelect" class="form-select select2" multiple></select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">FROM</label>
          <select id="selFrom" class="form-select select2"></select>
        </div>
      </div>
      <!-- WHERE (固定兩條件) -->
      <div class="bg-light p-3 rounded border mb-3">
        <label class="form-label fw-semibold mb-2">WHERE</label>
        <div class="row g-2 align-items-center mb-2 condition" data-idx="0">
          <div class="col-md-3"><select class="form-select select2 col-table"></select></div>
          <div class="col-md-3"><select class="form-select select2 col-col"></select></div>
          <div class="col-md-2"><select class="form-select op"><option value="=">=</option><option value=">">&gt;</option><option value="<"><</option><option value="LIKE">LIKE</option></select></div>
          <div class="col-md-4"><input type="text" class="form-control val" data-i18n-placeholder="placeholder_value" placeholder="值"></div>
        </div>
        <div class="row g-2 align-items-center mb-2">
          <div class="col-md-2 offset-md-3"><select id="logicSel" class="form-select"><option value="AND">AND</option><option value="OR">OR</option></select></div>
        </div>
        <div class="row g-2 align-items-center condition" data-idx="1">
          <div class="col-md-3"><select class="form-select select2 col-table"></select></div>
          <div class="col-md-3"><select class="form-select select2 col-col"></select></div>
          <div class="col-md-2"><select class="form-select op"><option value="=">=</option><option value=">">&gt;</option><option value="<"><</option><option value="LIKE">LIKE</option></select></div>
          <div class="col-md-4"><input type="text" class="form-control val" data-i18n-placeholder="placeholder_value" placeholder="值"></div>
        </div>
      </div>
      <!-- ORDER BY -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">ORDER BY</label>
          <select id="selOrder" class="form-select select2"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">方向</label>
          <select id="selDir" class="form-select"><option value="ASC">ASC</option><option value="DESC">DESC</option></select>
        </div>
      </div>
    </div>
    <div class="text-end pt-2">
      <button id="runBtn" class="btn btn-primary"><span data-i18n="btn_run">執行查詢</span></button>
    </div>
  </div>

  <!-- 結果區 -->
  <div id="resultBox" class="d-none mt-4">
    <h5 class="fw-semibold mb-2" data-i18n="gen_sql_title">產生 SQL</h5>
    <pre id="sqlShow" class="sql"></pre>
    <h5 class="fw-semibold mt-4 mb-2" data-i18n="query_results_title">查詢結果</h5>
    <div class="table-responsive"><table id="resTable" class="table table-bordered table-striped small"></table></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
/* ---------- i18n ---------- */
const T={
  'en':{tab_raw:'Raw SQL',tab_form:'Form SQL',editor_label:'Editor',btn_run:'Run Query',placeholder_value:'Value',gen_sql_title:'Generated SQL',query_results_title:'Query Results'},
  'zh-TW':{tab_raw:'原始 SQL',tab_form:'表單 SQL',editor_label:'編輯器',btn_run:'執行查詢',placeholder_value:'值',gen_sql_title:'產生 SQL',query_results_title:'查詢結果'}
};
function setLang(l){$('[data-i18n]').each(function(){const k=$(this).data('i18n');$(this).text(T[l][k])});$('[data-i18n-placeholder]').each(function(){const k=$(this).data('i18n-placeholder');$(this).attr('placeholder',T[l][k])});localStorage.setItem('lang',l)}
$('#langSel').on('change',e=>setLang(e.target.value));setLang(localStorage.getItem('lang')||'zh-TW');
/* ---------- Select2 ---------- */
$('.select2').select2({theme:'bootstrap-5',width:'100%'});
const tables=['customers','orders','orderdetails','products'];
const cols=['*','id','name','status','created_at'];
$('#selFrom').append(tables.map(t=>`<option value="${t}">${t}</option>`));
$('#selSelect').append(cols.map(c=>`<option>${c}</option>`)).val(['*']).trigger('change');
$('#selOrder').append(cols.filter(c=>c!=='*').map(c=>`<option>${c}</option>`));
$('.col-table').each((i,el)=>tables.forEach(t=>$(el).append(`<option>${t}</option>`)));
$('.col-col').each((i,el)=>cols.filter(c=>c!=='*').forEach(c=>$(el).append(`<option>${c}</option>`)));
$('.select2').trigger('change');
/* ---------- Run (mock) ---------- */
$('#runBtn').on('click',()=>{
  let sql='';
  if($('#raw').hasClass('show')){
    sql=$('#rawArea').val();
  }else{
    const selects=$('#selSelect').val().join(',')||'*';
    const from=$('#selFrom').val();
    const c1=getCond(0),c2=getCond(1);
    const logic=$('#logicSel').val();
    const order=$('#selOrder').val();
    const dir=$('#selDir').val();
    sql=`SELECT ${selects}\nFROM ${from}\nWHERE ${c1}\n  ${logic} ${c2}\nORDER BY ${order} ${dir};`;
  }
  $('#sqlShow').text(sql);
  $('#resTable').html('<thead><tr><th>id</th><th>name</th><th>created_at</th></tr></thead><tbody><tr><td>1</td><td>Alice
